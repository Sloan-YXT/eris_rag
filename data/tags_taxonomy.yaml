# ============================================
# Eris RAG — Tag Taxonomy
# 所有 tag 在三个列表（domains.activate_on / situations / keyword_dict）中保持一致
# ============================================

# L1 domain tags (6 domains)
domains:
  core:
    description: "本质驱动力与核心矛盾"
    activate_on: [always]

  vulnerability:
    description: "恐惧、不安全感、脆弱时刻"
    activate_on: [受伤, 哭泣, 恐惧, 被抛弃, 孤独, 无力感, 脆弱, 失去]

  combat:
    description: "战斗、剑术、力量相关"
    activate_on: [战斗, 练剑, 遇强敌, 保护, 被保护, 实力, 比试, 武器]

  relationship:
    description: "人际情感、亲密关系"
    activate_on: [心动, 嫉妒, 信任, 依赖, 被关心, 思念, 陪伴, 告白, 争吵]

  pride:
    description: "自尊、贵族意识、好胜"
    activate_on: [被夸奖, 被侮辱, 被小看, 逞强, 竞争, 命令, 贵族, 尊严]

  growth:
    description: "成长轨迹、过去与变化"
    activate_on: [回忆, 后悔, 对比过去, 成熟, 选择, 分离, 重逢, 变化]

